<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Defect Analytics Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="dash-body">

<div class="sidebar">
    <h2>📊 Dashboard</h2>
    <a href="/">Home</a>
    <a href="/dashboard" class="active">Analytics</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
</div>

<div class="main">

    <div class="section">
        <h1>Defect Analytics Dashboard</h1>
    </div>

    <div class="cards">
        <div class="card-box">
            <h3>Total Defects</h3>
            <p>{{ total_defects }}</p>
        </div>
        <div class="card-box">
            <h3>Most Common Defect</h3>
            <p>{{ most_common }}</p>
        </div>
        <div class="card-box">
            <h3>Average Confidence</h3>
            <p>{{ avg_conf }}%</p>
        </div>
    </div>

    <div class="charts">
        <div class="chart-box">
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="pieChart"></canvas>
        </div>
    </div>

</div>

<script>
const labels = {{ labels | tojson }};
const values = {{ values | tojson }};

new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Defect Count",
            data: values,
            backgroundColor: "#4bc0c0"
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        }
    }
});

new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: labels,
        datasets: [{
            data: values
        }]
    }
});
</script>

</body>
</html>
